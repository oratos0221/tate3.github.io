<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025 DB2 情報編集成果展「質問を起点にコンテンツをつくる」</title>
  <style>
    :root {
      --bg: #f4f2ee;
      --text: #1d1d1f;
      --muted: #6b6b6b;
      --card: #ffffff;
      --border: #d9d4cc;
      --accent: #1d1d1f;
      --accentText: #ffffff;
      --shadow: 0 12px 40px rgba(0,0,0,.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .screen {
      width: 100vw;
      height: 100vh;
    }

    /* 一覧画面 */
    #listScreen {
      display: flex;
      flex-direction: column;
      padding: 56px;
      gap: 40px;
    }

    .header {
      max-width: 980px;
    }

    .label {
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 12px;
    }

    h1 {
      font-size: clamp(40px, 6vw, 88px);
      line-height: .95;
      letter-spacing: -.06em;
      margin: 0;
      font-weight: 700;
    }

    .lead {
      max-width: 720px;
      font-size: clamp(16px, 1.7vw, 22px);
      line-height: 1.75;
      margin: 24px 0 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      overflow: auto;
      padding: 4px 4px 24px;
    }

    .workButton {
      min-height: 180px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      color: var(--text);
      text-align: left;
      padding: 28px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .workButton:hover,
    .workButton:focus-visible {
      transform: translateY(-3px);
      border-color: #aaa39a;
      box-shadow: 0 18px 54px rgba(0,0,0,.12);
      outline: none;
    }

    .workNumber {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .workTitle {
      display: block;
      font-size: clamp(22px, 2.2vw, 34px);
      line-height: 1.15;
      letter-spacing: -.03em;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .workDesc {
      display: block;
      font-size: 15px;
      line-height: 1.65;
      color: var(--muted);
    }

    /* ビューア画面 */
    #viewerScreen {
      display: none;
      position: relative;
      background: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .viewerBar {
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }

    .viewerTitle {
      display: flex;
      align-items: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #111;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(12px);
      font-size: 15px;
      font-weight: 700;
      max-width: 60vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewerHint {
      color: rgba(255,255,255,.55);
      font-size: 14px;
      margin: 0;
    }

    .backButton {
      min-height: 52px;
      padding: 0 22px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accentText);
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,0,0,.28);
      font-weight: 700;
    }

    .backButton:hover,
    .backButton:focus-visible {
      outline: 3px solid rgba(255,255,255,.65);
    }

    .idleNotice {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      display: none;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #111;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.22);
    }

    .help {
      position: fixed;
      left: 24px;
      bottom: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      #listScreen {
        padding: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .viewerTitle {
        display: none;
      }

      .backButton {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main id="listScreen" class="screen" aria-label="作品一覧">
    <section class="header">
      <p class="label">2025 DB2 情報編集成果展「質問を起点にコンテンツをつくる」</p>
      <p class="lead">
        閲覧する作品を選んでください。　一定時間操作がない場合、自動でこの一覧画面に戻ります。
      </p>
    </section>

    <section id="workGrid" class="grid" aria-label="作品リスト"></section>

    <div class="help"></div>
  </main>

  <section id="viewerScreen" class="screen" aria-label="作品ビューア">
    <div class="viewerBar">
      <div id="currentTitle" class="viewerTitle">作品タイトル</div>
      <button class="backButton" type="button" onclick="backToList()">一覧に戻る</button>
    </div>
    <div id="idleNotice" class="idleNotice">まもなく一覧に戻ります</div>
  </section>

  <script>
    /*
      使い方：
      1. 下の works の title / description / figmaUrl を差し替えてください。
      2. figmaUrl には、Figmaの共有URLを入れます。
      3. 通常URLでも動くように、Figma埋め込みURLへ自動変換します。
      4. 作品を増減する場合は、配列の要素を追加・削除してください。
    */

    const works = [
      {
        title: "気になるあの人のI LOVE this…",
        description: "田中虎太朗",
        figmaUrl: "https://www.figma.com/proto/xtb5kULar5ytHAJKGxlc8d/%E7%84%A1%E9%A1%8C?node-id=0-1&t=aX01mJeEsJqWl7CZ-1"
      }
      {
        title: "CREATORS ORIGIN",
        description: "田中 千優",
        figmaUrl: "https://www.figma.com/proto/ZF5TMzmSaUd4pL6CukHyaW/12461071%EF%BC%BF%E3%82%BF%E3%83%8A%E3%82%AB%E3%83%81%E3%83%92%E3%83%AD?node-id=4070-26&p=f&t=kDYaErBNECEnVyC7-1&scaling=scale-down&content-scaling=fixed&page-id=4070%3A24&starting-point-node-id=4070%3A26"
      },
      {
        title: "どう塗る？",
        description: "鴇田優",
        figmaUrl: "https://www.figma.com/proto/tvZcGBv57LdehPQPdFc4kl/12461086%EF%BC%BF%E3%83%88%E3%82%AD%E3%82%BF%E3%83%A6%E3%82%A6?node-id=2158-32&t=46IfzdR7becpwsDP-1"
      },
      {
        title: "選ぶ。盛る。食べる。",
        description: "名知愛未",
        figmaUrl: "https://www.figma.com/proto/N4eVlHquCcPGFA06ozR7iv/12461093_%E3%83%8A%E3%83%81%E3%82%A2%E3%83%A6%E3%83%9F?node-id=1-2&p=f&t=aWYDTPIaTPRC2OPf-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A535&show-proto-sidebar=1"
      }
    ];

    // 無操作で一覧に戻るまでの時間。展示状況に応じて変更してください。
    const IDLE_LIMIT_MS = 300 * 1000; // 30秒

    // 戻る直前に注意表示を出す時間。
    const NOTICE_BEFORE_MS = 10 * 1000; // 最後の10秒

    const listScreen = document.getElementById("listScreen");
    const viewerScreen = document.getElementById("viewerScreen");
    const workGrid = document.getElementById("workGrid");
    const currentTitle = document.getElementById("currentTitle");
    const idleNotice = document.getElementById("idleNotice");

    let idleTimer = null;
    let noticeTimer = null;
    let pollTimer = null;
    let isViewing = false;
    let viewerWindow = null;

    function renderWorkList() {
      workGrid.innerHTML = "";

      works.forEach((work, index) => {
        const button = document.createElement("button");
        button.className = "workButton";
        button.type = "button";
        button.onclick = () => showWork(index);

        button.innerHTML = `
          <div class="workNumber">${String(index + 1).padStart(2, "0")}</div>
          <span class="workTitle">${escapeHtml(work.title)}</span>
          <span class="workDesc">${escapeHtml(work.description || "")}</span>
        `;

        workGrid.appendChild(button);
      });
    }

    function showWork(index) {
      const work = works[index];
      if (!work) return;

      isViewing = true;

      const aLeft = screen.availLeft || 0;
      const aTop  = screen.availTop  || 0;
      const aW    = screen.availWidth;
      const aH    = screen.availHeight;
      const features = `popup=1,left=${aLeft},top=${aTop},width=${aW},height=${aH}`;

      if (viewerWindow && !viewerWindow.closed) {
        viewerWindow.location.href = work.figmaUrl;
        viewerWindow.focus();
      } else {
        viewerWindow = window.open(work.figmaUrl, "figmaViewer", features);
      }

      listScreen.style.display = "none";
      viewerScreen.style.display = "flex";

      resetIdleTimer();
      startPolling();
    }

    // ポップアップが手動で閉じられたら一覧へ戻る
    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(() => {
        if (viewerWindow && viewerWindow.closed) {
          backToList();
        }
      }, 500);
    }

    function backToList() {
      isViewing = false;
      clearTimeout(idleTimer);
      clearTimeout(noticeTimer);
      clearInterval(pollTimer);

      if (viewerWindow && !viewerWindow.closed) viewerWindow.close();
      viewerWindow = null;

      idleNotice.style.display = "none";
      viewerScreen.style.display = "none";
      listScreen.style.display = "flex";
    }

    function resetIdleTimer() {
      if (!isViewing) return;

      clearTimeout(idleTimer);
      clearTimeout(noticeTimer);
      idleNotice.style.display = "none";

      noticeTimer = setTimeout(() => {
        if (isViewing) idleNotice.style.display = "block";
      }, Math.max(0, IDLE_LIMIT_MS - NOTICE_BEFORE_MS));

      idleTimer = setTimeout(() => {
        if (isViewing) backToList();
      }, IDLE_LIMIT_MS);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // 親ページ上の操作を検知して無操作タイマーをリセット。
    // iframe内の細かな操作はブラウザの制約で拾えない場合があります。
    ["click", "mousemove", "mousedown", "keydown", "touchstart", "pointerdown"].forEach(eventName => {
      document.addEventListener(eventName, resetIdleTimer, { passive: true });
    });

    // キーボードでの不用意な操作を少し抑制。
    // 完全ロックではないため、本番ではキーボードを外す運用推奨。
    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (key === "escape") {
        event.preventDefault();
        backToList();
      }

      if ((event.ctrlKey || event.metaKey) && ["l", "t", "n", "w", "r"].includes(key)) {
        event.preventDefault();
      }
    });

    // 別タブ遷移を避けるため、親ページ内の通常リンクを抑制。
    // Figma iframe内部のリンク制御はFigma側の展示版作成で対応してください。
    document.addEventListener("click", event => {
      const link = event.target.closest("a");
      if (!link) return;
      event.preventDefault();
    });

    renderWorkList();
  </script>
</body>
</html>
